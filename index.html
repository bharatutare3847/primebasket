<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeBasket - Online Shopping</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
    }

    header{
      background:#e53935;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 10px;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:60px;
      background:white;
    }

    .hero h1{
      font-size:40px;
    }

    .btn{
      background:#e53935;
      color:white;
      padding:12px 25px;
      text-decoration:none;
      border-radius:5px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:30px;
    }

    .card{
      background:white;
      padding:15px;
      text-align:center;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    button{
      background:#e53935;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:20px;
    }
  </style>
</head>

<body>

<header>
  <h2>PrimeBasket</h2>

  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Categories</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to PrimeBasket</h1>
  <p>Men's Fashion • Beauty • Accessories</p>
  <a class="btn" href="#">Shop Now</a>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250x250" alt="">
<h3>Men T-Shirt</h3>
<p>₹499</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x250" alt="">
<h3>Watch</h3>
<p>₹999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x250" alt="">
<h3>Perfume</h3>
<p>₹799</p>
<button>Add to Cart</button>
</div>

</section>

<footer>
© 2026 PrimeBasket. All Rights Reserved.
</footer>

</body>
</html>
