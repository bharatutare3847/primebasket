<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeBasket</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2874f0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search{
width:40%;
padding:10px;
border:none;
border-radius:5px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.banner{
background:#fff;
padding:40px;
text-align:center;
margin:20px;
border-radius:10px;
}

.banner h1{
font-size:40px;
color:#2874f0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#fb641b;
color:white;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

footer{
background:#172337;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>

</head>

<body>

<header>
<div class="logo">PrimeBasket</div>

<input class="search" placeholder="Search Products">

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Cart</a>
</nav>

</header>

<div class="banner">
<h1>Welcome to PrimeBasket</h1>
<p>Best Deals | Fashion | Beauty | Accessories</p>
</div>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Men T-Shirt</h3>
<h2>₹499</h2>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Shoes</h3>
<h2>₹999</h2>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Watch</h3>
<h2>₹1499</h2>
<button>Add to Cart</button>
</div>

</section>

<footer>
© 2026 PrimeBasket | All Rights Reserved
</footer>

</body>
</html>
