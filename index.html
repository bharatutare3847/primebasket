<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeBasket</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2874f0;
color:#fff;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.search{
padding:10px;
width:40%;
border:none;
border-radius:5px;
}

.hero{
background:#fff;
padding:60px;
text-align:center;
}

.hero h1{
font-size:42px;
color:#2874f0;
}

.hero p{
margin-top:10px;
font-size:18px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#fb641b;
color:#fff;
border:none;
padding:10px 20px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

footer{
background:#172337;
color:#fff;
padding:20px;
text-align:center;
}
</style>

</head>

<body>

<header>
<div class="logo">PrimeBasket</div>

<input class="search" placeholder="Search Products">

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Cart</a>
</nav>
</header>

<section class="hero">
<h1>Welcome to PrimeBasket</h1>
<p>Amazon & Flipkart Style Shopping Website</p>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250" alt="T-Shirt">
<h3>Men T-Shirt</h3>
<h2>₹499</h2>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="Shoes">
<h3>Shoes</h3>
<h2>₹999</h2>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="Watch">
<h3>Watch</h3>
<h2>₹1499</h2>
<button>Add to Cart</button>
</div>

</section>

<footer>
© 2026 PrimeBasket. All Rights Reserved.
</footer>

</body>
</html>
